<div class="relative" (blur)="onBlur()">
  <div class="flex rounded-lg border border-gray-200 bg-white shadow-sm outline-none transition focus-within:border-brand-500 focus-within:ring-2 focus-within:ring-brand-500/20 dark:border-gray-800 dark:bg-gray-900">
    <!-- Country selector -->
    <button
      type="button"
      [disabled]="disabled"
      (mousedown)="toggleDropdown()"
      class="flex items-center gap-2 rounded-l-lg border-r border-gray-200 px-3 py-2.5 text-sm text-gray-800 hover:bg-gray-50 dark:border-gray-800 dark:text-white/90 dark:hover:bg-gray-800"
      [attr.aria-expanded]="isOpen()"
      aria-haspopup="listbox"
      aria-label="Select country"
    >
      @if (selectedCountry(); as sel) {
        <span
          class="h-5 w-7 shrink-0 rounded bg-cover bg-center bg-no-repeat"
          [style.backgroundImage]="('url(' + getFlagImageUrl(sel.code, 40) + ')') | safeStyle"
          role="img"
          [attr.aria-label]="sel.name"
        ></span>
        <span class="font-medium">+{{ sel.callingCode }}</span>
      }
      <svg class="size-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    </button>
    <!-- Phone input -->
    <input
      #inputRef
      type="tel"
      [id]="id"
      [name]="name"
      [value]="inputValue()"
      [placeholder]="placeholder"
      [disabled]="disabled"
      (input)="onInput($event)"
      (focus)="onFocus()"
      autocomplete="tel"
      class="min-w-0 flex-1 rounded-r-lg border-0 bg-transparent px-4 py-2.5 text-sm text-gray-800 outline-none placeholder:text-gray-400 disabled:opacity-70 dark:text-white/90 dark:placeholder:text-gray-500"
    />
  </div>

  @if (isOpen()) {
    <ul
      class="phone-dropdown absolute left-0 top-full z-50 mt-1 max-w-[280px] rounded-lg border border-gray-200 bg-white py-1 shadow-lg dark:border-gray-800 dark:bg-gray-900"
      role="listbox"
    >
      @for (opt of countryOptions; track opt.code) {
        <li
          role="option"
          (mousedown)="$event.preventDefault(); selectCountry(opt)"
          class="flex cursor-pointer items-center gap-3 px-3 py-2 text-sm text-gray-800 hover:bg-gray-50 dark:text-white/90 dark:hover:bg-gray-800"
        >
          <span
            class="h-5 w-7 shrink-0 rounded bg-cover bg-center bg-no-repeat"
            [style.backgroundImage]="('url(' + getFlagImageUrl(opt.code, 40) + ')') | safeStyle"
            role="img"
            [attr.aria-label]="opt.name"
          ></span>
          <span class="flex-1 truncate">{{ opt.name }}</span>
          <span class="text-gray-500">+{{ opt.callingCode }}</span>
        </li>
      }
    </ul>
  }

  @if (touched() && invalid()) {
    <p class="mt-1.5 text-xs text-error-500">Please enter a valid international phone number.</p>
  }
</div>
